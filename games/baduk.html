    <!-- 메인 게임 컨테이너 -->
    <div class="game-container">
        <div class="board-wrapper">
            <!-- 현재 턴 표시 -->
            <div class="turn-indicator" id="turn-indicator">
                <div class="turn-stone black" id="turn-stone"></div>

            </div>

            <!-- 바둑판 캔버스 -->
            <div class="board-canvas-wrapper">
                <canvas id="board-canvas"></canvas>
            </div>

            <!-- 게임 정보 -->
            <div class="game-info">
                <div class="info-item">
                    <span class="stone-icon black"></span>
                    <span id="black-captures">0</span>
                </div>
                <div class="info-item">
                    <span>수순: </span>
                    <span id="move-count">0</span>
                </div>
                <div class="info-item">
                    <span class="stone-icon white"></span>
                    <span id="white-captures">0</span>
                </div>
            </div>

            <!-- 게임 컨트롤 버튼 -->
            <div class="game-controls">
                <button class="control-btn" id="btn-new-game">새 게임</button>
                <button class="control-btn" id="btn-undo">무르기</button>
                <button class="control-btn" id="btn-pass">패스</button>
                <button class="control-btn" id="btn-count">개가</button>
                <button class="control-btn danger" id="btn-resign">기권</button>

    <!-- 설정 모달 -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">설정</h2>
                <button class="modal-close" id="close-settings-modal">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-group">
                    <label class="setting-label">바둑판 크기</label>
                    <select id="board-size" class="setting-select">
                        <option value="9">9×9</option>
                        <option value="13">13×13</option>
                        <option value="19" selected>19×19</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="setting-label">게임 모드</label>
                    <select id="game-mode" class="setting-select">
                        <option value="local">로컬 대국</option>
                        <option value="ai">AI 대국</option>
                    </select>
                </div>
                <div class="setting-group" id="ai-settings" style="display: none;">
                    <label class="setting-label">AI 난이도</label>
                    <select id="ai-level" class="setting-select">
                        <option value="1">초급</option>
                        <option value="2" selected>중급</option>
                        <option value="3">고급</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="setting-label">
                        <input type="checkbox" id="sound-enabled" checked> 소리
                    </label>
                </div>
                <div class="setting-group">
                    <label class="setting-label">
                        <input type="checkbox" id="face-enabled" checked> 바둑알 표정
                    </label>
                </div>
                <div class="setting-group">
                    <button class="control-btn" id="btn-save">기보 저장</button>
                    <button class="control-btn" id="btn-load">기보 불러오기</button>
                    <input type="file" id="sgf-file-input" accept=".sgf" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <!-- 게임 종료 모달 -->
    <div class="modal-overlay" id="gameover-modal">
        <div class="modal-content" style="text-align: center; max-width: 350px;">

                <h2 class="modal-title">게임 종료</h2>
            </div>
            <div style="padding: 20px;">
                <p id="gameover-message" style="font-size: 22px; margin-bottom: 20px;"></p>
                <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 25px;">
                    <div>
                        <div class="stone-icon black large"></div>
                        <div style="color: #666; font-size: 14px;">흑</div>
                        <div style="font-size: 24px; font-weight: bold;" id="black-score">0</div>
                    </div>
                    <div>
                        <div class="stone-icon white large"></div>
                        <div style="color: #666; font-size: 14px;">백</div>
                        <div style="font-size: 24px; font-weight: bold;" id="white-score">0</div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="control-btn primary" id="btn-rematch">다시 하기</button>
                    <button class="control-btn" id="btn-close-gameover">닫기</button>
                </div>
            </div>
        </div>
