        var AZ_UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        var AZ_LOWER = 'abcdefghijklmnopqrstuvwxyz';
        var DIGITS = '0123456789';

        function convertChar(style, ch) {
            if (style.map) {
                return style.map[ch] !== undefined ? style.map[ch] : ch;
            }
            var ui = AZ_UPPER.indexOf(ch);
            if (ui !== -1 && style.upper && style.upper[ui]) return style.upper[ui];
            var li = AZ_LOWER.indexOf(ch);
            if (li !== -1 && style.lower && style.lower[li]) return style.lower[li];
            var di = DIGITS.indexOf(ch);
            if (di !== -1 && style.digit && style.digit[di]) return style.digit[di];
            return ch;
        }

        function convert(style, text) {
            var result = text.split('').map(function(ch){ return convertChar(style, ch); }).join('');
            if (style.reverse) result = result.split('').reverse().join('');
            return result;
        }

        function renderCards() {
            var text = document.getElementById('style-input').value;
            var grid = document.getElementById('style-grid');

            grid.innerHTML = STYLES.map(function(style, idx) {
                var output = text ? convert(style, text) : '';
                var displayText = output || '<span class="placeholder-text">н…ҚмҠӨнҠёлҘј мһ…л Ҙн•ҳл©ҙ м—¬кё°м—җ ліҖнҷҳ кІ°кіјк°Җ н‘ңмӢңлҗ©лӢҲлӢӨ</span>';
                var hasOutput = !!output;

                return '<div class="style-card">'
                    + '<div class="style-card-header">'
                    + '<span class="style-name">' + style.name + '</span>'
                    + '<span class="style-preview-label">' + style.preview + '</span>'
                    + '</div>'
                    + '<div class="style-card-body">'
                    + '<span class="style-output" id="out-'+idx+'">' + (hasOutput ? escHtml(output) : displayText) + '</span>'
                    + (hasOutput ? '<button class="copy-btn" id="copybtn-'+idx+'" onclick="copyStyle('+idx+')">ліөмӮ¬</button>' : '')
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function copyStyle(idx) {
            var el = document.getElementById('out-'+idx);
            var text = el.textContent || '';
            var btn = document.getElementById('copybtn-'+idx);
            navigator.clipboard.writeText(text).then(function(){
                btn.textContent = 'вң“ ліөмӮ¬лҗЁ';
                btn.classList.add('copied');
                setTimeout(function(){ btn.textContent = 'ліөмӮ¬'; btn.classList.remove('copied'); }, 2000);
                showStatus('ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ');
            });
        }

        function copyAll() {
            var text = document.getElementById('style-input').value;
            if (!text.trim()) { showStatus('н…ҚмҠӨнҠёлҘј мһ…л Ҙн•ҳм„ёмҡ”.', true); return; }
            var lines = STYLES.map(function(style){
                return style.name + ':\n' + convert(style, text);
            }).join('\n\n');
            navigator.clipboard.writeText(lines).then(function(){
                showStatus('м „мІҙ кІ°кіјк°Җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ');
            });
        }

        function clearInput() {
            document.getElementById('style-input').value = '';
            renderCards();
        }

        function showStatus(msg, isError) {
            var s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status ' + (isError ? 'error' : 'success');
            setTimeout(function(){ s.className = 'status'; }, 3000);
        }

        document.getElementById('style-input').addEventListener('input', function(){
            clearTimeout(window._styleTimer);
            window._styleTimer = setTimeout(renderCards, 150);
        });

        renderCards();
    </script>
