<body>

    <main>
        <div id="status" class="status"></div>

        <div class="panel">

            </div>
            <div class="search-row">
                <input type="text" id="search-input" data-i18n-placeholder="countrySearchPlaceholder" placeholder="국가명, ISO코드, 전화코드 등으로 검색..." autofocus>
            </div>
            <div class="result-count" id="result-count"></div>

            <div style="overflow-x:auto;">
                <table class="country-table">
                    <thead>
                        <tr>
                            <th onclick="sortBy('flag')" id="th-flag">국기</th>
                            <th onclick="sortBy('name')" id="th-name">국가명 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('iso2')" id="th-iso2">ISO2 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('dial')" id="th-dial">전화코드 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('currency')" id="th-currency">화폐 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('capital')" id="th-capital">수도 <span class="sort-arrow">▲</span></th>
                        </tr>
                    </thead>
                    <tbody id="country-tbody"></tbody>
                </table>
            </div>
            <div id="no-results" class="no-results" style="display:none;">검색 결과가 없습니다.</div>
        </div>
    </main>

            ['🇫🇮','핀란드','FI','FIN','+358','EUR (유로)','헬싱키'],

            ['🇰🇪','케냐','KE','KEN','+254','KES (실링)','나이로비'],
            ['🇬🇭','가나','GH','GHA','+233','GHS (세디)','아크라'],
            ['🇲🇦','모로코','MA','MAR','+212','MAD (디르함)','라바트'],
            ['🇪🇹','에티오피아','ET','ETH','+251','ETB (비르)','아디스아바바'],
            ['🇵🇭','필리핀','PH','PHL','+63','PHP (페소)','마닐라'],
            ['🇲🇲','미얀마','MM','MMR','+95','MMK (짯)','네피도'],
            ['🇱🇰','스리랑카','LK','LKA','+94','LKR (루피)','콜롬보'],
            ['🇳🇵','네팔','NP','NPL','+977','NPR (루피)','카트만두'],
            ['🇰🇿','카자흐스탄','KZ','KAZ','+7','KZT (텡게)','아스타나'],
            ['🇺🇿','우즈베키스탄','UZ','UZB','+998','UZS (숨)','타슈켄트'],
            ['🇮🇶','이라크','IQ','IRQ','+964','IQD (디나르)','바그다드'],
            ['🇯🇴','요르단','JO','JOR','+962','JOD (디나르)','암만'],
            ['🇱🇧','레바논','LB','LBN','+961','LBP (파운드)','베이루트'],
            ['🇰🇼','쿠웨이트','KW','KWT','+965','KWD (디나르)','쿠웨이트시티'],
            ['🇶🇦','카타르','QA','QAT','+974','QAR (리얄)','도하'],
            ['🇧🇭','바레인','BH','BHR','+973','BHD (디나르)','마나마'],
            ['🇴🇲','오만','OM','OMN','+968','OMR (리알)','무스카트'],
            ['🇵🇦','파나마','PA','PAN','+507','PAB (발보아)','파나마시티'],
            ['🇨🇷','코스타리카','CR','CRI','+506','CRC (콜론)','산호세'],
            ['🇸🇰','슬로바키아','SK','SVK','+421','EUR (유로)','브라티슬라바'],
            ['🇭🇷','크로아티아','HR','HRV','+385','EUR (유로)','자그레브'],
            ['🇧🇬','불가리아','BG','BGR','+359','BGN (레프)','소피아'],
            ['🇷🇸','세르비아','RS','SRB','+381','RSD (디나르)','베오그라드'],
        ];

        var sortField = 'name';
        var sortAsc = true;

        function fieldIndex(f) {
            var map = {flag:0, name:1, iso2:2, dial:4, currency:5, capital:6};
            return map[f] !== undefined ? map[f] : 1;
        }

        function sortBy(field) {
            if (sortField === field) { sortAsc = !sortAsc; }
            else { sortField = field; sortAsc = true; }
            render();
        }

        function render() {
            var query = document.getElementById('search-input').value.toLowerCase().trim();
            var data = COUNTRIES.filter(function(c){
                if (!query) return true;
                return c[1].toLowerCase().indexOf(query) !== -1 ||
                       c[2].toLowerCase().indexOf(query) !== -1 ||
                       c[3].toLowerCase().indexOf(query) !== -1 ||
                       c[4].indexOf(query) !== -1 ||
                       c[5].toLowerCase().indexOf(query) !== -1 ||
                       c[6].toLowerCase().indexOf(query) !== -1;
            });

            var fi = fieldIndex(sortField);
            data.sort(function(a, b){
                var av = a[fi] || '', bv = b[fi] || '';
                // numeric sort for dial codes
                if (sortField === 'dial') {
                    av = parseInt(av.replace(/\D/g,'')) || 0;
                    bv = parseInt(bv.replace(/\D/g,'')) || 0;
                    return sortAsc ? av - bv : bv - av;
                }
                return sortAsc ? av.localeCompare(bv, 'ko') : bv.localeCompare(av, 'ko');
            });

            // update header arrows
            var fields = ['flag','name','iso2','dial','currency','capital'];
            fields.forEach(function(f){
                var th = document.getElementById('th-'+f);
                if (!th) return;
                if (f === 'flag') { th.className = ''; return; }
                th.className = f === sortField ? 'sorted' : '';
                var arrow = th.querySelector('.sort-arrow');
                if (arrow) arrow.textContent = (!sortAsc && f === sortField) ? '▼' : '▲';
            });

            document.getElementById('result-count').textContent = data.length + '개 국가';

            var tbody = document.getElementById('country-tbody');
            var noRes = document.getElementById('no-results');
            if (data.length === 0) {
                tbody.innerHTML = '';
                noRes.style.display = 'block';
                return;
            }
            noRes.style.display = 'none';

            tbody.innerHTML = data.map(function(c){
                return '<tr>'
                    + '<td class="flag-cell">' + c[0] + '</td>'
                    + '<td><strong>' + esc(c[1]) + '</strong></td>'
                    + '<td><span class="iso-code">' + c[2] + '</span></td>'
                    + '<td><span class="dial-code">' + esc(c[4]) + '</span></td>'
                    + '<td>' + esc(c[5]) + '</td>'
                    + '<td>' + esc(c[6]) + '</td>'
                    + '</tr>';
            }).join('');
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        document.getElementById('search-input').addEventListener('input', function(){
            clearTimeout(window._searchTimer);
            window._searchTimer = setTimeout(render, 150);
        });

        render();
    </script>
    <script src="/assets/js/i18n.js?v=4"></script>
    <script src="/assets/js/layout.js?v=3"></script>
