    <style>
        main { max-width: 800px; }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
        }

        .control-group input[type="text"] {
            padding: 12px 14px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 24px;
            text-align: center;
            background: #fff;
            font-family: sans-serif;
        }

        .control-group input[type="text"]:focus {
            outline: none;
            border-color: #86868b;
        }

        .control-group input[type="color"] {
            width: 100%;
            height: 48px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            cursor: pointer;
            padding: 4px;
            background: #fff;
        }

        .slider-group {
            margin-bottom: 20px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .slider-label span {
            font-weight: 400;
            color: #86868b;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #d2d2d7;
            border-radius: 3px;
            outline: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #1d1d1f;
            border-radius: 50%;
            cursor: pointer;
        }

        .preview-section {
            text-align: center;
            padding: 24px;
            background: #f5f5f7;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .preview-section h3 {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .canvas-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 32px;
            flex-wrap: wrap;
        }

        .canvas-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .canvas-item canvas {
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            image-rendering: pixelated;
        }

        .canvas-label {
            font-size: 12px;
            color: #86868b;
            font-weight: 500;
        }

        .download-btn {
            padding: 8px 16px;
            background: #1d1d1f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            transition: background 0.2s;
        }

        .download-btn:hover { background: #3a3a3c; }

        .bg-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .bg-preset {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .bg-preset:hover { transform: scale(1.1); }
        .bg-preset.active { border-color: #1d1d1f; }

        .rounded-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .rounded-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .controls-grid { grid-template-columns: 1fr; }
            .canvas-row { gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1 data-i18n="faviconHeading">파비콘 생성기</h1>
        <p data-i18n="faviconSubheading">텍스트 또는 이모지로 파비콘을 만들고 PNG로 다운로드하세요</p>
    </div>

    <main>
        <div class="panel">
            <div class="panel-title" data-i18n="faviconInputTitle">텍스트 / 이모지 입력</div>

            <div class="controls-grid">
                <div class="control-group">
                    <label>텍스트 또는 이모지 (1~2자)</label>
                    <input type="text" id="favicon-text" value="⚡" maxlength="2" oninput="updatePreview()">
                </div>
                <div class="control-group">
                    <label>글자 색상</label>
                    <input type="color" id="text-color" value="#ffffff" oninput="updatePreview()">
                </div>
                <div class="control-group">
                    <label>배경 색상</label>
                    <input type="color" id="bg-color" value="#3B82F6" oninput="updatePreview()">
                </div>
                <div class="control-group">
                    <label>배경 프리셋</label>
                    <div class="bg-options" id="bg-presets"></div>
                </div>
            </div>

            <div class="slider-group">
                <div class="slider-label">글자 크기 <span id="font-size-val">70%</span></div>
                <input type="range" id="font-size" min="30" max="95" value="70" oninput="updateFontSizeLabel(); updatePreview()">
            </div>

            <label class="rounded-toggle">
                <input type="checkbox" id="rounded" checked onchange="updatePreview()">
                모서리 둥글게 (22% 라운드)
            </label>
        </div>

        <div class="panel">
            <div class="panel-title" data-i18n="faviconPreviewTitle">미리보기 및 다운로드</div>
            <div class="preview-section">
                <h3>실제 크기 미리보기</h3>
                <div class="canvas-row">
                    <div class="canvas-item">
                        <canvas id="canvas-64" width="64" height="64" style="width:128px;height:128px;"></canvas>
                        <span class="canvas-label">64×64</span>
                        <button class="download-btn" data-i18n="faviconDownloadBtn" onclick="downloadCanvas('canvas-64', 64)">PNG 다운로드</button>
                    </div>
                    <div class="canvas-item">
                        <canvas id="canvas-32" width="32" height="32" style="width:64px;height:64px;"></canvas>
                        <span class="canvas-label">32×32</span>
                        <button class="download-btn" data-i18n="faviconDownloadBtn" onclick="downloadCanvas('canvas-32', 32)">PNG 다운로드</button>
                    </div>
                    <div class="canvas-item">
                        <canvas id="canvas-16" width="16" height="16" style="width:48px;height:48px;"></canvas>
                        <span class="canvas-label">16×16</span>
                        <button class="download-btn" data-i18n="faviconDownloadBtn" onclick="downloadCanvas('canvas-16', 16)">PNG 다운로드</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const bgPresets = [
            '#3B82F6', '#10B981', '#F59E0B', '#EF4444',
            '#8B5CF6', '#EC4899', '#1d1d1f', '#ffffff'
        ];

        function initPresets() {
            const container = document.getElementById('bg-presets');
            bgPresets.forEach((color, idx) => {
                const btn = document.createElement('div');
                btn.className = 'bg-preset' + (idx === 0 ? ' active' : '');
                btn.style.background = color;
                btn.style.boxShadow = color === '#ffffff' ? 'inset 0 0 0 1px #d2d2d7' : 'none';
                btn.title = color;
                btn.onclick = () => {
                    document.getElementById('bg-color').value = color;
                    document.querySelectorAll('.bg-preset').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updatePreview();
                };
                container.appendChild(btn);
            });
        }

        function updateFontSizeLabel() {
            document.getElementById('font-size-val').textContent = document.getElementById('font-size').value + '%';
        }

        function drawFavicon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('favicon-text').value || '?';
            const bgColor = document.getElementById('bg-color').value;
            const textColor = document.getElementById('text-color').value;
            const fontSizePct = parseInt(document.getElementById('font-size').value);
            const rounded = document.getElementById('rounded').checked;

            ctx.clearRect(0, 0, size, size);

            if (rounded) {
                const radius = size * 0.22;
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                ctx.fillStyle = bgColor;
                ctx.fill();
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, size, size);
            }

            const chars = [...text];
            const fontSize = Math.round(size * fontSizePct / 100);

            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (chars.length <= 1) {
                ctx.font = `${fontSize}px sans-serif`;
                ctx.fillText(text, size / 2, size / 2 + size * 0.02);
            } else {
                const smallSize = Math.round(size * fontSizePct * 0.52 / 100);
                ctx.font = `700 ${smallSize}px 'Pretendard', sans-serif`;
                ctx.fillText(text.substring(0, 2), size / 2, size / 2 + size * 0.02);
            }
        }

        function updatePreview() {
            drawFavicon('canvas-64', 64);
            drawFavicon('canvas-32', 32);
            drawFavicon('canvas-16', 16);
        }

        function downloadCanvas(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = `favicon-${size}x${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        initPresets();
        updatePreview();
    </script>
    <script src="/assets/js/i18n.js?v=4"></script>
    <script src="/assets/js/layout.js?v=3"></script>
</body>
