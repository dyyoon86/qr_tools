    <style>
        main { max-width: 900px; }

        .editor-area {
            width: 100%;
            min-height: 200px;
            max-height: 360px;
            padding: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.7;
            font-family: 'Pretendard', sans-serif;
            resize: vertical;
            background: #fff;
            color: #1d1d1f;
            box-sizing: border-box;
        }

        .editor-area:focus {
            outline: none;
            border-color: #86868b;
        }

        .editor-area::placeholder { color: #b0b0b8; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat-card {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .stat-card .value {
            font-size: 26px;
            font-weight: 700;
            color: #1d1d1f;
            line-height: 1;
        }

        .stat-card .sub {
            font-size: 11px;
            color: #86868b;
            margin-top: 4px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .breakdown-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #f5f5f7;
            border-radius: 9px;
        }

        .breakdown-item .b-label {
            font-size: 13px;
            color: #1d1d1f;
            font-weight: 500;
        }

        .breakdown-item .b-value {
            font-size: 15px;
            font-weight: 700;
            color: #1d1d1f;
        }

        .breakdown-item .b-pct {
            font-size: 11px;
            color: #86868b;
            margin-left: 4px;
        }

        .keyword-table {
            width: 100%;
            border-collapse: collapse;
        }

        .keyword-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #86868b;
            padding: 8px 10px;
            border-bottom: 1px solid #e8e8ed;
        }

        .keyword-table td {
            padding: 9px 10px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f5;
            vertical-align: middle;
        }

        .keyword-table tr:last-child td { border-bottom: none; }

        .keyword-table .rank {
            font-size: 12px;
            color: #86868b;
            font-weight: 600;
            width: 28px;
        }

        .keyword-table .word-cell { font-weight: 600; color: #1d1d1f; }
        .keyword-table .count-cell { color: #3B82F6; font-weight: 700; width: 50px; text-align: right; }

        .bar-cell { width: 120px; }

        .bar-bg {
            height: 6px;
            background: #e8e8ed;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #3B82F6;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .clear-btn {
            padding: 8px 18px;
            background: #e8e8ed;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            transition: background 0.2s;
        }

        .clear-btn:hover { background: #d2d2d7; }

        .empty-msg {
            text-align: center;
            padding: 24px;
            color: #86868b;
            font-size: 14px;
        }

        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
            .breakdown-grid { grid-template-columns: 1fr; }
        }

<body>
    <div class="page-header">
        <h1 data-i18n="textAnalyzerHeading">텍스트 분석기 Pro</h1>
        <p data-i18n="textAnalyzerSubheading">글자수, 단어수, 바이트, 키워드 빈도를 실시간으로 분석합니다</p>
    </div>

    <main>
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div class="panel-title" style="margin-bottom:0;" data-i18n="textAnalyzerInputTitle">텍스트 입력</div>
                <button class="clear-btn" onclick="clearText()" data-i18n="clearBtn">지우기</button>
            </div>
            <textarea
                class="editor-area"
                id="text-input"
                data-i18n-placeholder="textAnalyzerPlaceholder" placeholder="분석할 텍스트를 입력하거나 붙여넣기 하세요..."
                oninput="analyze()"
            ></textarea>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">글자수 (공백 포함)</div>
                    <div class="value" id="stat-chars">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">글자수 (공백 제외)</div>
                    <div class="value" id="stat-chars-no-space">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">단어수</div>
                    <div class="value" id="stat-words">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">문장수</div>
                    <div class="value" id="stat-sentences">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">문단수</div>
                    <div class="value" id="stat-paragraphs">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">예상 읽기 시간</div>
                    <div class="value" id="stat-read-time">0초</div>
                    <div class="sub">분당 500자 기준</div>
                </div>
                <div class="stat-card">
                    <div class="label">UTF-8 바이트</div>
                    <div class="value" id="stat-bytes">0</div>
                    <div class="sub">Bytes</div>
                </div>
                <div class="stat-card">
                    <div class="label">줄 수</div>
                    <div class="value" id="stat-lines">0</div>
                </div>
            </div>
        </div>

        <div class="two-col">
            <div class="panel">
                <div class="panel-title" data-i18n="textAnalyzerCharTypeTitle">문자 유형 분석</div>
                <div class="breakdown-grid">
                    <div class="breakdown-item"><span class="b-label">한글</span><span><span class="b-value" id="br-hangul">0</span><span class="b-pct" id="br-hangul-pct"></span></span></div>
                    <div class="breakdown-item"><span class="b-label">영문</span><span><span class="b-value" id="br-latin">0</span><span class="b-pct" id="br-latin-pct"></span></span></div>
                    <div class="breakdown-item"><span class="b-label">숫자</span><span><span class="b-value" id="br-number">0</span><span class="b-pct" id="br-number-pct"></span></span></div>
                    <div class="breakdown-item"><span class="b-label">특수문자</span><span><span class="b-value" id="br-special">0</span><span class="b-pct" id="br-special-pct"></span></span></div>
                    <div class="breakdown-item"><span class="b-label">공백</span><span><span class="b-value" id="br-space">0</span><span class="b-pct" id="br-space-pct"></span></span></div>
                    <div class="breakdown-item"><span class="b-label">이모지</span><span><span class="b-value" id="br-emoji">0</span><span class="b-pct" id="br-emoji-pct"></span></span></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title" data-i18n="textAnalyzerKeywordsTitle">상위 10 키워드</div>
                <div id="keyword-container">
                    <div class="empty-msg">텍스트를 입력하면 키워드를 분석합니다</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function getUtf8Bytes(str) {
            return new TextEncoder().encode(str).length;
        }

        function clearText() {
            document.getElementById('text-input').value = '';
            analyze();
        }

        function analyze() {
            const text = document.getElementById('text-input').value;

            const chars = text.length;
            const charsNoSpace = text.replace(/\s/g, '').length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).filter(w => w.length > 0).length;
            const sentences = text.trim() === '' ? 0 : (text.match(/[.!?。！？]+/g) || []).length;
            const paragraphs = text.trim() === '' ? 0 : (text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length || (text.trim() ? 1 : 0));
            const lines = text === '' ? 0 : text.split('\n').length;
            const bytes = getUtf8Bytes(text);

            const readSec = Math.round(charsNoSpace / (500 / 60));
            let readTimeStr;
            if (readSec < 60) readTimeStr = readSec + '초';
            else readTimeStr = Math.round(readSec / 60) + '분';

            document.getElementById('stat-chars').textContent = chars.toLocaleString();
            document.getElementById('stat-chars-no-space').textContent = charsNoSpace.toLocaleString();
            document.getElementById('stat-words').textContent = words.toLocaleString();
            document.getElementById('stat-sentences').textContent = sentences.toLocaleString();
            document.getElementById('stat-paragraphs').textContent = paragraphs.toLocaleString();
            document.getElementById('stat-read-time').textContent = chars === 0 ? '0초' : readTimeStr;
            document.getElementById('stat-bytes').textContent = bytes.toLocaleString();
            document.getElementById('stat-lines').textContent = lines.toLocaleString();

            // Emoji detection
            const emojiRe = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;
            const emojiMatches = text.match(emojiRe) || [];
            const emojiCount = emojiMatches.length;
            const textNoEmoji = text.replace(emojiRe, '');

            const hangulCount = (textNoEmoji.match(/[\u1100-\u11FF\u3130-\u318F\uAC00-\uD7AF]/g) || []).length;
            const latinCount = (textNoEmoji.match(/[a-zA-Z]/g) || []).length;
            const numberCount = (textNoEmoji.match(/[0-9]/g) || []).length;
            const spaceCount = (text.match(/\s/g) || []).length;
            const specialCount = Math.max(0, charsNoSpace - hangulCount - latinCount - numberCount - emojiCount);

            function setPct(idSuffix, count, total) {
                const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0';
                document.getElementById('br-' + idSuffix + '-pct').textContent = total > 0 ? '(' + pct + '%)' : '';
            }

            document.getElementById('br-hangul').textContent = hangulCount.toLocaleString();
            document.getElementById('br-latin').textContent = latinCount.toLocaleString();
            document.getElementById('br-number').textContent = numberCount.toLocaleString();
            document.getElementById('br-special').textContent = specialCount.toLocaleString();
            document.getElementById('br-space').textContent = spaceCount.toLocaleString();
            document.getElementById('br-emoji').textContent = emojiCount.toLocaleString();

            setPct('hangul', hangulCount, chars);
            setPct('latin', latinCount, chars);
            setPct('number', numberCount, chars);
            setPct('special', specialCount, chars);
            setPct('space', spaceCount, chars);
            setPct('emoji', emojiCount, chars);

            analyzeKeywords(text);
        }

        function analyzeKeywords(text) {
            const container = document.getElementById('keyword-container');
            if (text.trim() === '') {
                container.innerHTML = '<div class="empty-msg">텍스트를 입력하면 키워드를 분석합니다</div>';
                return;
            }

            const words = text
                .replace(/[^\w\s\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F]/g, ' ')
                .split(/\s+/)
                .filter(w => w.length >= 2)
                .map(w => w.toLowerCase());

            const stopWords = new Set(['이', '가', '을', '를', '은', '는', '에', '의', '와', '과', '로', '으로', '에서', '도', '만', '이다', '있다', '하다', '그', '저', '이것', 'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'has', 'have', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'can', 'to', 'of', 'in', 'for', 'on', 'with', 'at', 'by', 'from', 'and', 'or', 'but', 'not', 'that', 'this', 'it', 'its']);

            const freq = {};
            words.forEach(w => {
                if (!stopWords.has(w) && w.length >= 2) {
                    freq[w] = (freq[w] || 0) + 1;
                }
            });

            const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 10);

            if (sorted.length === 0) {
                container.innerHTML = '<div class="empty-msg">분석할 키워드가 없습니다</div>';
                return;
            }

            const maxCount = sorted[0][1];
            let html = '<table class="keyword-table"><tr><th>#</th><th>단어</th><th style="text-align:right;">횟수</th><th>비율</th></tr>';
            sorted.forEach(([word, count], i) => {
                const pct = Math.round((count / maxCount) * 100);
                html += '<tr>' +
                    '<td class="rank">' + (i + 1) + '</td>' +
                    '<td class="word-cell">' + word + '</td>' +
                    '<td class="count-cell">' + count + '</td>' +
                    '<td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%"></div></div></td>' +
                    '</tr>';
            });
            html += '</table>';
            container.innerHTML = html;
        }

        analyze();
    </script>
    <script src="/assets/js/i18n.js?v=4"></script>
    <script src="/assets/js/layout.js?v=3"></script>
</body>
